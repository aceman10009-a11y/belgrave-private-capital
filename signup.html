<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Belgrave Private Bank</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page login">

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <h1>Belgrave Private Bank</h1>
      <p>Private Banking Registration</p>
    </div>

    <h2>Create Account</h2>

    <input id="fullName" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email Address">

    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Create Password">
      <button type="button" onclick="togglePassword()">👁</button>
    </div>

    <div class="strength-box">
      <div id="strengthBar"></div>
      <small id="strengthText">Password Strength</small>
    </div>

    <button onclick="signup()">Create Account</button>

    <p id="msg" class="message"></p>

    <p class="auth-link">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script type="module">

import {
  auth,
  db,
  doc,
  setDoc,
  createUserWithEmailAndPassword,
  sendEmailVerification
} from "./firebase.js";

window.signup = async function () {

  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!fullName || !email || !password) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  let user = null;
  let profileTimeout;

  try {

    msg.innerText = "Creating account...";

    // 1. CREATE AUTH USER
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    user = userCred.user;

    console.log("Auth user created:", user.uid);

    // 2. SAFETY TIMEOUT (prevents stuck state)
    profileTimeout = setTimeout(() => {
      msg.innerText = "Profile setup delayed... retrying safe redirect.";
      window.location.href = "login.html";
    }, 8000);

    msg.innerText = "Setting up secure profile...";

    // 3. ENSURE PROFILE ALWAYS EXISTS (FORCE SAFE WRITE)
    const userRef = doc(db, "users", user.uid);

    await setDoc(userRef, {
      fullName: fullName,
      firstName: fullName.split(" ")[0],
      lastName: fullName.split(" ").slice(1).join(" ") || "",
      email: email,

      // 🔥 CRITICAL FIX: enforce numeric + default values
      balance: 0,
      cashBalance: 0,
      investmentBalance: 0,
      totalAssets: 0,

      createdAt: new Date().toISOString()
    }, { merge: true }); // 🔥 prevents overwrite issues

    clearTimeout(profileTimeout);

    console.log("Profile guaranteed for UID:", user.uid);

    msg.innerText = "Verifying email...";

    // 4. EMAIL VERIFICATION (non-blocking)
    await sendEmailVerification(user).catch(err => {
      console.warn("Email verification failed:", err);
    });

    msg.innerText = "Account created successfully. Redirecting...";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (err) {

    if (profileTimeout) clearTimeout(profileTimeout);

    console.error("SIGNUP ERROR:", err);

    // 🔥 RECOVERY: if auth succeeded but firestore failed
    if (user) {
      try {
        await setDoc(doc(db, "users", user.uid), {
          fullName,
          balance: 0,
          createdAt: new Date().toISOString()
        }, { merge: true });

        msg.innerText = "Account created (recovered). Redirecting...";
        setTimeout(() => window.location.href = "login.html", 2000);
        return;

      } catch (e) {
        console.error("Recovery failed:", e);
      }
    }

    msg.innerText = err.code + " | " + err.message;
  }
};

window.togglePassword = function () {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
};

window.addEventListener("DOMContentLoaded", () => {

  const passwordInput = document.getElementById("password");
  const strengthBar = document.getElementById("strengthBar");
  const strengthText = document.getElementById("strengthText");

  if (!passwordInput || !strengthBar || !strengthText) return;

  passwordInput.addEventListener("input", () => {

    const value = passwordInput.value;
    let score = 0;

    if (value.length >= 10) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[a-z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[\W_]/.test(value)) score++;

    if (score <= 2) {
      strengthBar.style.width = "33%";
      strengthBar.style.background = "red";
      strengthText.innerText = "Weak Password";
    }
    else if (score <= 4) {
      strengthBar.style.width = "66%";
      strengthBar.style.background = "orange";
      strengthText.innerText = "Medium Password";
    }
    else {
      strengthBar.style.width = "100%";
      strengthBar.style.background = "limegreen";
      strengthText.innerText = "Strong Password";
    }

  });

});

</script>
</body>
</html>
