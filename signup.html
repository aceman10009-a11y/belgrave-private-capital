<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Belgrave Private Capital</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="auth-page login">

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <h1>Belgrave Private Capital</h1>
      <p>Private Banking Registration</p>
    </div>

    <h2>Create Account</h2>

    <input id="fullName" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email Address">

    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Create Password">
      <button type="button" onclick="togglePassword()">👁</button>
    </div>

    <div class="strength-box">
      <div id="strengthBar"></div>
      <small id="strengthText">Password Strength</small>
    </div>

    <button onclick="signup()">Create Account</button>

    <p id="msg" class="message"></p>

    <p class="auth-link">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script type="module">

import {
  auth,
  db,
  doc,
  setDoc,
  createUserWithEmailAndPassword,
  sendEmailVerification
} from "./firebase.js";

/* =========================
   SIGNUP FUNCTION
========================= */
window.signup = async function () {

  const fullName = document.getElementById("fullName").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!fullName || !email || !password) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  const passwordRegex =
    /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{10,}$/;

  if (!passwordRegex.test(password)) {
    msg.innerText = "Weak password format.";
    return;
  }

  try {

    msg.innerText = "Creating account...";

    const userCred =
      await createUserWithEmailAndPassword(auth, email, password);

    const user = userCred.user;

    await sendEmailVerification(user);

    await setDoc(doc(db, "users", user.uid), {
      fullName,
      email,
      emailVerified: false,
      hasAccount: false,
      accountType: null,
      balance: 0,
      accountNumber: null,
      createdAt: new Date().toISOString()
    });

    msg.innerText = "Account created. Check email.";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {
    msg.innerText = err.message;
  }
};

/* =========================
   TOGGLE PASSWORD
========================= */
window.togglePassword = function () {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
};

/* =========================
   PASSWORD STRENGTH FIX (IMPORTANT)
========================= */
window.addEventListener("DOMContentLoaded", () => {

  const passwordInput = document.getElementById("password");
  const strengthBar = document.getElementById("strengthBar");
  const strengthText = document.getElementById("strengthText");

  if (!passwordInput) return;

  passwordInput.addEventListener("input", () => {

    let score = 0;
    const value = passwordInput.value;

    if (value.length >= 10) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[a-z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[\W_]/.test(value)) score++;

    if (score <= 2) {
      strengthBar.style.width = "33%";
      strengthBar.style.background = "red";
      strengthText.innerText = "Weak Password";
    }
    else if (score <= 4) {
      strengthBar.style.width = "66%";
      strengthBar.style.background = "orange";
      strengthText.innerText = "Medium Password";
    }
    else {
      strengthBar.style.width = "100%";
      strengthBar.style.background = "limegreen";
      strengthText.innerText = "Strong Password";
    }

  });

});

</script>

<div style="text-align:center; margin-top:15px;">
  <a href="index.html" style="color:#d4af37; text-decoration:none;">
    ← Back to Home
  </a>
</div>

</body>
</html>
