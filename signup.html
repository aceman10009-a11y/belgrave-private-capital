<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Belgrave Private Bank</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page login">

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <h1>Belgrave Private Bank</h1>
      <p>Private Banking Registration</p>
    </div>

    <h2>Create Account</h2>

    <input id="fullName" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email Address">

    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Create Password">
      <button type="button" onclick="togglePassword()">👁</button>
    </div>

    <div class="strength-box">
      <div id="strengthBar"></div>
      <small id="strengthText">Password Strength</small>
    </div>

    <button onclick="signup()">Create Account</button>

    <p id="msg" class="message"></p>

    <p class="auth-link">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script type="module">

import {
  auth,
  db,
  doc,
  setDoc,
  createUserWithEmailAndPassword,
  sendEmailVerification
} from "./firebase.js";

window.signup = async function () {

  const fullName = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!fullName || !email || !password) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  let user = null;

  try {

    msg.innerText = "Creating account...";

    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    user = userCred.user;

    const userRef = doc(db, "users", user.uid);

    await setDoc(userRef, {
      fullName: fullName,
      email: email,
      balance: 0,
      cashBalance: 0,
      investmentBalance: 0,
      totalAssets: 0,
      createdAt: new Date().toISOString()
    }, { merge: true });

    msg.innerText = "Verifying email...";

    await sendEmailVerification(user).catch(() => {});

    msg.innerText = "Account created successfully. Redirecting...";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {
    console.error("SIGNUP ERROR:", err);
    msg.innerText = err.message;
  }
};

window.togglePassword = function () {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
};

</script>

</body>
</html>
