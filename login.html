<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belgrave Private Bank | Client Login</title>

<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page login">

<div class="auth-container">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="brand-logo">B</div>
      <h1>Belgrave Private Bank</h1>
      <p>Private Banking Portal</p>
    </div>

    <h2>Client Login</h2>

    <!-- FORM WRAPPER ADDED (FIX FOR RELOAD ISSUE) -->
    <form id="loginForm">

      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input id="email" type="email" placeholder="Email Address">
      </div>

      <div class="password-wrapper">
        <input id="password" type="password" placeholder="Password">
        <button type="button" onclick="togglePassword()">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <!-- CHANGED TO SUBMIT BUTTON -->
      <button type="submit" class="primary-btn">Login</button>

    </form>

    <p id="msg" class="message"></p>

    <p class="auth-link">
      Don't have an account?
      <a href="signup.html">Create Account</a>
    </p>

  </div>

</div>

<script type="module">

import {
  auth,
  signInWithEmailAndPassword
} from "./firebase.js";

/* LOGIN FUNCTION (SAFE + NO RELOAD) */
window.login = async function (e) {
  if (e) e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  const btn = document.querySelector(".primary-btn");

  if (!email || !password) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  try {
    btn.disabled = true;
    btn.innerText = "Logging in...";
    msg.innerText = "";

    const userCred = await signInWithEmailAndPassword(auth, email, password);

    console.log("LOGIN SUCCESS:", userCred.user.uid);

    msg.innerText = "Login successful...";

setTimeout(() => {
  window.location.href = "dashboard.html";
}, 800);

  } catch (err) {
    console.log("AUTH ERROR:", err);
    msg.innerText = err.message;
  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
};

/* CONNECT FORM TO LOGIN HANDLER (IMPORTANT FIX) */
document.getElementById("loginForm").addEventListener("submit", window.login);

window.togglePassword = function () {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
};

</script>

<div style="text-align:center; margin-top:15px;">
  <a href="index.html" style="color:#d4af37; text-decoration:none;">
    ← Back to Home
  </a>
</div>

</body>
</html>
